<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WCA Hub — World Connect Academy</title>
    <meta name="description" content="Plataforma de gestión académica de World Connect Academy. Aprende inglés con metodología continua." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Tabler Icons (todos los portales los usan para íconos) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />

    <!-- Google Fonts: DM Sans (tipografía principal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
        background: #f5f7fa;
        color: #1f2933;
      }
      /* Scrollbar global */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #c5d5db; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #155266; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
